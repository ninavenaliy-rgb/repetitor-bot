services:
  bot:
    build: .
    container_name: repetitor-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: repetitor-celery
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data

  db:
    image: postgres:16-alpine
    container_name: repetitor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: repetitor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: repetitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repetitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: repetitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
